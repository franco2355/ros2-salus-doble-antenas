    frequency: 30.0
    delay: 1.0
    magnetic_declination_radians: -0.122
    yaw_offset: 0.0
    zero_altitude: true
    broadcast_utm_transform: true
    publish_filtered_gps: false
    use_odometry_yaw: true
    # wait_for_datum: false
    wait_for_datum: true
    datum: [-31.4858037, -64.2410570, 0.0] # Ejemplo: CIT, Córdoba, Argentina


    gps_topic: /gps/fix
    odom_topic: /odometry/local
    output_topic: /gps/odometry
