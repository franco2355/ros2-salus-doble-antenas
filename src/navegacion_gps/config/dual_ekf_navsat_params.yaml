# Nodo encargado de fusionar odometría y IMU para estimar 'odom' -> 'base_link'
ekf_filter_node_odom:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: true
    transform_time_offset: 0.0
